kind = "web"
previewPath = "/"
title = "Golden Fish Rush"
version = "1.0.0"
id = "artifacts/golden-fish-rush"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18496

[services.development]
run = "pnpm --filter @workspace/golden-fish-rush run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/golden-fish-rush", "run", "build" ]
serve = "static"
publicDir = "artifacts/golden-fish-rush/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18496"
BASE_PATH = "/"
