name: Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK and AAB
    runs-on: ubuntu-latest
    env:
      RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
      RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
      RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
      RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Signing Secrets
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "Error: RELEASE_KEYSTORE_BASE64 secret is missing!"
            exit 1
          fi
          if [ -z "$RELEASE_STORE_PASSWORD" ]; then
            echo "Error: RELEASE_STORE_PASSWORD secret is missing!"
            exit 1
          fi
          if [ -z "$RELEASE_KEY_ALIAS" ]; then
            echo "Error: RELEASE_KEY_ALIAS secret is missing!"
            exit 1
          fi
          if [ -z "$RELEASE_KEY_PASSWORD" ]; then
            echo "Error: RELEASE_KEY_PASSWORD secret is missing!"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36"

      - name: Build web application
        run: pnpm build

      - name: Sync with Capacitor
        run: npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Decode Keystore
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Build Android App Bundle AAB
        env:
          RELEASE_STORE_FILE: "release.keystore"
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Verify Signed AAB
        run: |
          jarsigner -verify android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload Signed AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: golden-fish-dash-signed-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
