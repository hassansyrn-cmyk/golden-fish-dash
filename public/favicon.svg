<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A4D7A"/>
      <stop offset="1" stop-color="#021A2E"/>
    </linearGradient>
    <linearGradient id="goldBody" x1="40" y1="40" x2="140" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE066"/>
      <stop offset="0.5" stop-color="#FFD60A"/>
      <stop offset="1" stop-color="#FF9500"/>
    </linearGradient>
    <linearGradient id="fin" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFB703"/>
      <stop offset="1" stop-color="#E85D04"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Rounded square background -->
  <rect width="180" height="180" rx="40" fill="url(#ocean)"/>
  
  <!-- Soft light rays -->
  <path d="M90 0 L70 90 L110 90 Z" fill="rgba(255,255,255,0.08)"/>
  <path d="M90 0 L50 100 L130 100 Z" fill="rgba(255,255,255,0.05)"/>
  
  <!-- Bubbles -->
  <circle cx="30" cy="40" r="6" fill="rgba(255,255,255,0.25)"/>
  <circle cx="150" cy="50" r="4" fill="rgba(255,255,255,0.2)"/>
  <circle cx="40" cy="140" r="5" fill="rgba(255,255,255,0.15)"/>
  <circle cx="145" cy="130" r="3" fill="rgba(255,255,255,0.2)"/>
  
  <!-- Fish body -->
  <g filter="url(#glow)">
    <!-- Main body -->
    <ellipse cx="90" cy="95" rx="52" ry="38" fill="url(#goldBody)"/>
    
    <!-- Tail -->
    <path d="M38 95 Q15 70 20 95 Q15 120 38 95" fill="url(#fin)"/>
    
    <!-- Top fin -->
    <path d="M75 60 Q90 30 110 58 Q95 50 75 60" fill="url(#fin)"/>
    
    <!-- Bottom fin -->
    <path d="M85 125 Q95 145 110 128 Q100 130 85 125" fill="url(#fin)"/>
    
    <!-- Side fin -->
    <path d="M100 100 Q120 90 125 110 Q110 105 100 100" fill="url(#fin)"/>
    
    <!-- Eye white -->
    <circle cx="118" cy="85" r="12" fill="white"/>
    <!-- Eye pupil -->
    <circle cx="121" cy="85" r="6" fill="#1a1a1a"/>
    <circle cx="123" cy="83" r="2" fill="white"/>
    
    <!-- Smile -->
    <path d="M125 100 Q130 108 120 110" stroke="#E85D04" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    
    <!-- Cheek blush -->
    <circle cx="110" cy="100" r="5" fill="rgba(255,100,100,0.35)"/>
    
    <!-- Body shine -->
    <ellipse cx="75" cy="80" rx="18" ry="10" fill="rgba(255,255,255,0.35)" transform="rotate(-20 75 80)"/>
  </g>
</svg>
